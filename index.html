<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>行政学 単語帳</title>
<style>
:root{
  --paper:#F1ECDC;
  --card:#FBF7EE;
  --ink:#232C3D;
  --ink-soft:#655C4B;
  --line:#DDD0AC;
  --stamp:#A6392D;
  --stamp-bg:rgba(166,57,45,0.10);
  --gold:#7C5E2A;
  --gold-bg:rgba(124,94,42,0.15);
  --pine:#3E6350;
  --pine-bg:rgba(62,99,80,0.12);
  --serif:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;
  --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Hiragino Sans","Noto Sans JP",sans-serif;
  --mono:ui-monospace,"SF Mono","Menlo","Courier New",monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:
    repeating-linear-gradient(to bottom, rgba(35,44,61,0) 0 27px, rgba(35,44,61,0.04) 27px 28px),
    var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  min-height:100dvh;
}
button{font:inherit;}
.app{max-width:460px;margin:0 auto;padding:28px 18px 52px;}

/* ---------- Header ---------- */
.topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-bottom:20px;}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--gold);margin:0 0 5px;}
h1{font-family:var(--serif);font-size:26px;margin:0;color:var(--ink);font-weight:700;letter-spacing:.03em;}
.overall-progress{text-align:right;font-family:var(--mono);color:var(--ink-soft);font-size:11px;line-height:1.5;white-space:nowrap;flex-shrink:0;}
.overall-progress .count-num{font-size:19px;color:var(--pine);font-weight:700;}
.overall-progress .count-slash{color:var(--ink-soft);}
.overall-progress .count-label{display:block;letter-spacing:.08em;}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 12px;margin-bottom:2px;-ms-overflow-style:none;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-chip{position:relative;flex:0 0 auto;padding:7px 13px 9px;border-radius:8px 8px 3px 3px;background:var(--card);border:1px solid var(--line);font-family:var(--sans);font-size:12.5px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;overflow:hidden;}
.tab-chip .tab-date{display:inline-block;font-family:var(--mono);font-size:9.5px;color:inherit;opacity:.65;margin-left:4px;}
.tab-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.tab-fill{position:absolute;left:0;bottom:0;height:2px;width:0;background:var(--pine);}

/* ---------- Toolbar ---------- */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-family:var(--sans);font-size:12.5px;cursor:pointer;}
.toggle-btn .icon{font-size:13px;}
.toggle-btn.on{background:var(--pine-bg);border-color:var(--pine);color:var(--pine);}
.reset-link{margin-left:auto;background:none;border:none;color:var(--ink-soft);font-size:11px;text-decoration:underline;text-underline-offset:2px;cursor:pointer;opacity:.7;padding:4px 0;}
.reset-link.confirm{color:var(--stamp);opacity:1;font-weight:600;}

/* ---------- Lecture progress ---------- */
.lecture-progress{width:100%;display:flex;align-items:center;gap:8px;margin-bottom:14px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);white-space:nowrap;}
.bar-track{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:var(--pine);border-radius:2px;width:0;transition:width .25s;}

/* ---------- Card ---------- */
.stage{display:flex;flex-direction:column;align-items:center;}
.card-wrap{width:100%;margin-bottom:16px;}
.flashcard{
  position:relative;
  cursor:pointer;
  border-radius:10px;
  outline:none;
  -webkit-user-select:none;
  user-select:none;
  touch-action:pan-y;
}
.flashcard::before,.flashcard::after{
  content:"";
  position:absolute;
  inset:0;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
}
.flashcard::before{transform:translate(5px,7px);opacity:.6;z-index:1;}
.flashcard::after{transform:translate(10px,14px);opacity:.32;z-index:0;}
.flashcard:focus-visible .card-inner{box-shadow:0 0 0 3px rgba(62,99,80,.35);}
.tab-flag{
  position:absolute;
  top:20px;
  right:-7px;
  background:var(--gold);
  color:var(--paper);
  font-family:var(--mono);
  font-size:10.5px;
  font-weight:600;
  padding:4px 10px 4px 8px;
  border-radius:3px 0 0 3px;
  z-index:3;
  box-shadow:-2px 2px 5px rgba(35,20,10,.15);
  letter-spacing:.03em;
  pointer-events:none;
}
.card-inner{
  position:relative;
  z-index:2;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:0 1px 2px rgba(35,44,61,.05);
  display:flex;
  flex-direction:column;
  min-height:300px;
  padding:30px 22px 20px;
  transition:transform .16s ease, opacity .16s ease;
}
.card-inner::before,.card-inner::after{
  content:"";
  position:absolute;
  top:11px;
  width:9px;height:9px;
  border-radius:50%;
  background:var(--paper);
  border:1px solid var(--line);
  box-shadow:inset 0 1px 2px rgba(35,44,61,.28);
  z-index:4;
}
.card-inner::before{left:26px;}
.card-inner::after{left:49px;}
.card-inner.anim-flip{transform:rotateY(85deg) scale(.96);opacity:0;}
.card-inner.anim-next{transform:translateX(-16px);opacity:0;}
.card-inner.anim-prev{transform:translateX(16px);opacity:0;}

.card-meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:16px;gap:10px;}
.card-tag,.card-source{max-width:62%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-question{flex:1;display:flex;align-items:center;font-family:var(--serif);font-size:clamp(17px,4.6vw,21px);line-height:1.85;color:var(--ink);letter-spacing:.01em;}
.flip-hint{text-align:center;font-size:11.5px;color:var(--ink-soft);margin-top:16px;opacity:.7;}
.flip-hint::before{content:"◇ ";}

.answer-area{flex:1;display:flex;align-items:center;justify-content:center;}
.yn-answer{display:flex;flex-direction:column;align-items:center;gap:3px;}
.yn-glyph{font-size:60px;line-height:1;font-family:var(--serif);}
.yn-yes .yn-glyph{color:var(--pine);}
.yn-no .yn-glyph{color:var(--stamp);}
.yn-word{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;color:var(--ink-soft);}
.plain-answer{font-family:var(--serif);font-size:clamp(19px,5.6vw,26px);color:var(--ink);text-align:center;line-height:1.7;width:100%;}
.plain-answer .hl{background-image:linear-gradient(transparent 60%, var(--gold-bg) 60%);padding:0 2px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}

.note-area{margin-top:14px;padding:10px 12px;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;font-size:12.5px;line-height:1.7;color:var(--ink);}
.note-label{font-family:var(--mono);font-weight:700;color:var(--gold);margin-right:6px;letter-spacing:.05em;}

.mastery-row{display:flex;gap:10px;margin-top:18px;}
.mastery-btn{flex:1;padding:11px 0;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);transition:all .15s;}
.mastery-btn.not-yet:hover{border-color:var(--stamp);color:var(--stamp);}
.mastery-btn.mastered{background:var(--pine);border-color:var(--pine);color:#fff;}
.mastery-btn.mastered.is-active{box-shadow:inset 0 0 0 2px rgba(255,255,255,.55);}

/* ---------- Nav row ---------- */
.nav-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:6px;}
.nav-arrow{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(35,44,61,.08);-webkit-user-select:none;user-select:none;}
.tab-chip,.toggle-btn,.mastery-btn,.reset-link{-webkit-user-select:none;user-select:none;}
.nav-arrow:disabled{opacity:.3;cursor:default;}
.position-indicator{font-family:var(--mono);font-size:13px;color:var(--ink-soft);min-width:64px;text-align:center;}

/* ---------- Empty state ---------- */
.empty-state{text-align:center;padding:60px 20px;}
.empty-emoji{font-size:40px;margin:0 0 12px;}
.empty-text{font-family:var(--serif);font-size:17px;color:var(--ink);margin:0 0 20px;}

/* ---------- Footer ---------- */
.foot-note{margin-top:26px;text-align:center;}
.foot-note p{font-size:11px;color:var(--ink-soft);opacity:.7;line-height:1.7;margin:0;}

@media (max-width:360px){
  h1{font-size:23px;}
  .card-inner{min-height:280px;padding:26px 18px 18px;}
}
@media (hover:none){
  .mastery-btn.not-yet:hover{border-color:var(--line);color:var(--ink-soft);}
  .nav-arrow:active{background:var(--line);}
  .mastery-btn:active{opacity:.75;}
  .tab-chip:active{opacity:.75;}
}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="title-block">
      <p class="eyebrow">行政学 小テスト対策</p>
      <h1>単語帳</h1>
    </div>
    <div class="overall-progress">
      <span><span class="count-num" id="masteredCount">0</span><span class="count-slash">/306</span></span>
      <span class="count-label">習得ずみ</span>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="toolbar">
    <button class="toggle-btn" id="shuffleBtn" type="button"><span class="icon">⤨</span>シャッフル</button>
    <button class="toggle-btn" id="hideKnownBtn" type="button"><span class="icon">◎</span>未習得のみ</button>
    <button class="reset-link" id="resetBtn" type="button">進捗をリセット</button>
  </div>

  <main class="stage">
    <div class="lecture-progress" id="lectureProgress" hidden>
      <div class="bar-track"><div class="bar-fill" id="lectureBarFill"></div></div>
      <span id="lectureProgressLabel"></span>
    </div>

    <div class="card-wrap" id="cardWrap">
      <div class="flashcard" id="flashcard" tabindex="0" role="button" aria-label="タップして答えを表示">
        <div class="tab-flag" id="tabFlag">第1回</div>
        <div class="card-inner" id="cardInner"></div>
      </div>
    </div>

    <div class="nav-row" id="navRow">
      <button class="nav-arrow" id="prevBtn" aria-label="前のカード" type="button">‹</button>
      <span class="position-indicator" id="positionIndicator">1 / 306</span>
      <button class="nav-arrow" id="nextBtn" aria-label="次のカード" type="button">›</button>
    </div>

    <div class="empty-state" id="emptyState" hidden>
      <p class="empty-emoji">🎉</p>
      <p class="empty-text">この範囲はすべて覚えました！</p>
      <button class="toggle-btn" id="emptyShowAllBtn" type="button">すべて表示してもう一度</button>
    </div>
  </main>

  <footer class="foot-note">
    <p>全306枚・第1回〜第15回（4/10〜7/17）。カードをタップして答えを確認し、「まだ」「覚えた」で進捗を記録します。進捗はこの端末に保存されます。</p>
  </footer>

</div>

<script>
const DATA = {"cards":[{"no":1,"q":"行政学を英語でいうと？","a":"Public Administration","tag":"第1回 行政学 基本","source":"第1回(4/10)その1","note":"","lecture":1},{"no":2,"q":"行政学：官僚制の研究はどの学問と関係が深い？","a":"社会学","tag":"第1回 行政学 分野","source":"第1回(4/10)その1","note":"","lecture":1},{"no":3,"q":"行政学：行政組織の管理・経営はどの学問と関係が深い？","a":"経営学","tag":"第1回 行政学 分野","source":"第1回(4/10)その1","note":"","lecture":1},{"no":4,"q":"行政学：財源の調達・配分はどの学問と関係が深い？","a":"財政学","tag":"第1回 行政学 分野","source":"第1回(4/10)その1","note":"","lecture":1},{"no":5,"q":"行政学：法制度の枠組はどの学問と関係が深い？","a":"法律学","tag":"第1回 行政学 分野","source":"第1回(4/10)その1","note":"","lecture":1},{"no":6,"q":"行政学は、行政官僚制の作動様式を拘束する何の枠組みに関心を持つ？","a":"制度","tag":"第1回 行政学 関心","source":"第1回(4/10)その1","note":"","lecture":1},{"no":7,"q":"行政学は、組織行動を統制し調整するための組織何の仕組みに関心を持つ？","a":"管理","tag":"第1回 行政学 関心","source":"第1回(4/10)その1","note":"","lecture":1},{"no":8,"q":"行政学は、官僚制の組織セッティングで行われる何と、その形成・実施過程に関心を持つ？","a":"政策","tag":"第1回 行政学 関心","source":"第1回(4/10)その1","note":"","lecture":1},{"no":9,"q":"対立する考えや利益を調整し、集団として意思を決定・実現することを何という？","a":"政治","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":10,"q":"意思の決定と実現が一人の人間によって行われる仕組みは？","a":"独裁制","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":11,"q":"構成員全員が意思決定と実現に直接関わる仕組みは？","a":"直接民主制","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":12,"q":"代表を選出し、具体的な意思決定と実現をゆだねる仕組みは？","a":"間接民主制","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":13,"q":"決定された意思の実現のために伴う強制は？","a":"権力","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":14,"q":"統治のための組織は？","a":"政府","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":15,"q":"統治作用のうち、ルールを決定する作用は？","a":"立法","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":16,"q":"決定された意思を具体的に実現する作用は？","a":"行政","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":17,"q":"ルールに従わないときに裁定を行う作用は？","a":"司法","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":18,"q":"雇われた人を監督する人達・機関は？","a":"執政部","tag":"政治概念","source":"第2回/政治概念","note":"","lecture":2},{"no":19,"q":"執政部の長（執政長官）は議会によって選出される。","a":"議院内閣制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":20,"q":"行政権は執政部の長（執政長官）に属する。","a":"大統領制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":21,"q":"権力の制度的分立システムである。","a":"大統領制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":22,"q":"執政部の長（執政長官）は法案提出権をもつのが通例である。","a":"議院内閣制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":23,"q":"行政権は合議制の執政部に属する。","a":"議院内閣制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":24,"q":"執政部の長（執政長官）は議会を解散できない。","a":"大統領制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":25,"q":"執政部の意思は合議制の会議を経て決定される。","a":"議院内閣制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":26,"q":"執政部は議会に対して責任を負う。","a":"議院内閣制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":27,"q":"執政部の長と議会がそれぞれ国民に選出され、支持政党と議会多数党が一致しないことがある。","a":"大統領制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":28,"q":"執政部の長（執政長官）は議会を解散できる。","a":"議院内閣制","tag":"第2回 大統領制 議院内閣制","source":"第2回(4/17)その1","note":"","lecture":2},{"no":29,"q":"内閣は行政権の行使について、国会に対し連帯して責任を負う。","a":"YES","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"","lecture":2},{"no":30,"q":"内閣の首長は内閣総理大臣である。","a":"YES","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"","lecture":2},{"no":31,"q":"内閣総理大臣は国務大臣を任命できるが、罷免することはできない。","a":"NO","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"罷免もできる。","lecture":2},{"no":32,"q":"国務大臣のうち過半数は、国会議員の中から選ばなければならない。","a":"YES","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"","lecture":2},{"no":33,"q":"内閣は衆議院を解散できるが、参議院を解散することはできない。","a":"YES","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"","lecture":2},{"no":34,"q":"内閣総理大臣は、衆議院の議決により指名される。","a":"NO","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"国会の議決で指名。衆議院の議決が優先。","lecture":2},{"no":35,"q":"内閣は国会により不信任決議案を可決されることがある。","a":"NO","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"不信任決議は衆議院。","lecture":2},{"no":36,"q":"内閣総理大臣の指名にあたっては、衆議院の議決が優先する。","a":"YES","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"","lecture":2},{"no":37,"q":"行政権の行使について国会に対して責任を負うのは、内閣総理大臣である。","a":"NO","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"責任を負うのは内閣。","lecture":2},{"no":38,"q":"内閣総理大臣は内閣を代表して議案を国会に提出する。","a":"YES","tag":"第2回 日本国憲法 YESNO","source":"第2回(4/17)その2","note":"","lecture":2},{"no":39,"q":"日本の衆議院の選挙制度は1993年まで中選挙区制だったため、二大政党制が出現しやすい条件が整っていた。","a":"NO","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":40,"q":"わが国の議院内閣制は「コンセンサス・モデル」と理解されてきた。","a":"NO","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":41,"q":"わが国の議院内閣制は「ウェストミンスター・モデル」と理解されてきた。","a":"NO","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":42,"q":"わが国の議院内閣制は「変換型」と理解されてきた。","a":"NO","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":43,"q":"わが国の議院内閣制は「アリーナ型」と理解されてきた。","a":"NO","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":44,"q":"「アリーナ」型議院内閣制の典型は、スウェーデンに見ることができる。","a":"NO","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":45,"q":"議院内閣制の特色とされる「合議制の原則」「分担管理の原則」「首相主導の原則」は、相互に反発し合う性格である。","a":"YES","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":46,"q":"英国は「首相主導の原則」が際立っているタイプと理解されてきた。","a":"YES","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":47,"q":"大陸諸国は「合議制の原則」が際立っていると考えられる。","a":"YES","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":48,"q":"日本の議院内閣制では「分担管理の原則」が際立っていると指摘されてきた。","a":"YES","tag":"第2回 議院内閣制モデル YESNO","source":"第2回(4/17)その3","note":"","lecture":2},{"no":49,"q":"国の行政組織に関する通則を定める法律は？","a":"国家行政組織法","tag":"第3回 行政組織","source":"第3回(4/24)その1","note":"","lecture":3},{"no":50,"q":"国家行政組織法上の国の行政機関は、省・委員会・何？","a":"庁","tag":"第3回 行政組織","source":"第3回(4/24)その1","note":"","lecture":3},{"no":51,"q":"国家行政組織法上、委員会と庁は省の何として置かれる？","a":"外局","tag":"第3回 行政組織","source":"第3回(4/24)その1","note":"","lecture":3},{"no":52,"q":"2026年4月現在、府省庁委員会のうち「府」の名称は？","a":"内閣府","tag":"第3回 行政組織","source":"第3回(4/24)その1","note":"","lecture":3},{"no":53,"q":"大臣が置かれる庁の例を2つ答えよ。","a":"復興庁・デジタル庁","tag":"第3回 行政組織","source":"第3回(4/24)その1","note":"","lecture":3},{"no":54,"q":"各省大臣が、主任の事務について機関の命令として発することができるものは？","a":"省令","tag":"第3回 行政組織","source":"第3回(4/24)その1","note":"","lecture":3},{"no":55,"q":"行政の基本的制度、地方自治、情報通信、郵政、消防などを任務とする省は？","a":"総務省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":56,"q":"国土の利用・開発・保全、社会資本、交通政策、観光、気象、海上安全を任務とする省は？","a":"国土交通省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":57,"q":"経済・産業の発展、鉱物資源・エネルギー供給を任務とする省は？","a":"経済産業省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":58,"q":"教育、生涯学習、学術、スポーツ、文化、科学技術、宗教行政を任務とする省は？","a":"文部科学省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":59,"q":"基本法制、法秩序、国民の権利擁護、国の争訟、出入国管理を任務とする省は？","a":"法務省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":60,"q":"地球環境保全、公害防止、自然環境保護などを任務とする省は？","a":"環境省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":61,"q":"食料の安定供給、農林水産業、農山漁村、森林、水産資源を任務とする省は？","a":"農林水産省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":62,"q":"社会福祉、社会保障、公衆衛生、労働条件、職業確保を任務とする省は？","a":"厚生労働省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":63,"q":"平和で安全な国際社会、対外関係、日本国・国民の利益を任務とする省は？","a":"外務省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":64,"q":"我が国の平和と独立、国の安全、自衛隊の管理運営を任務とする省は？","a":"防衛省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":65,"q":"健全な財政、課税、税関、国庫、通貨、外国為替を任務とする省は？","a":"財務省","tag":"第3回 各省任務","source":"第3回(4/24)その2","note":"","lecture":3},{"no":66,"q":"各省の長は大臣である。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":67,"q":"大臣、副大臣、政務官、事務次官は政治任用職であり、政務四役と呼ばれる。","a":"NO","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":68,"q":"各省には官房・局・課がおかれ、省の骨格を作っている。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":69,"q":"大臣官房には人事課・会計課・総務課などが置かれ、通常、官房三課と呼ばれる。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":70,"q":"官房三課では、省全体に関わる事務を行っている。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":71,"q":"原局・原課は、各省の所掌事務を分業体制で担っている。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":72,"q":"省の筆頭課として置かれる政策課は、局内の人事・文書・会計等の総括管理を担う。","a":"NO","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"総括管理は通常、総務課など。","lecture":3},{"no":73,"q":"省などは、必要がある場合には地方支分部局を置くことができる。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":74,"q":"地方支分部局の例として、京都府庁をあげることができる。","a":"NO","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":75,"q":"地方支分部局の例として、労働基準監督署をあげることができる。","a":"YES","tag":"第3回 省庁構造 YESNO","source":"第3回(4/24)その3","note":"","lecture":3},{"no":76,"q":"「内閣」は、狭義の内閣と広義の内閣の意味で使われる場合がある。","a":"YES","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":77,"q":"各省大臣は、主任の大臣として、所掌事務を分担管理している。","a":"YES","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":78,"q":"2001年の中央省庁再編で、内閣府が強化され、内閣官房が新たに設置された。","a":"NO","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":79,"q":"橋本行革では、内閣官房の事務として「企画立案・総合調整」が加えられた。","a":"YES","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":80,"q":"内閣には、内閣官房、内閣府、復興庁、デジタル庁、国税庁、文化庁などが置かれる。","a":"NO","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":81,"q":"中央省庁再編前に総合調整機能を担った機関は「総務省」で、主任大臣は内閣総理大臣だった。","a":"NO","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"総理府。","lecture":4},{"no":82,"q":"内閣官房副長官は、すべて政治家出身者で占められている。","a":"NO","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":83,"q":"内閣官房には、内閣官房副長官補、内閣総理大臣補佐官、内閣危機管理監などが置かれる。","a":"YES","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":84,"q":"内閣人事局は、国家公務員と地方公務員の人事管理制度の企画立案などを行う。","a":"NO","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":85,"q":"内閣府は、内閣の重要政策に関する内閣の事務を助けることなどを任務とする。","a":"YES","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":86,"q":"内閣府特命担当大臣の人数について、提示された説明は正しい。","a":"NO","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"人数に関する選択肢は不正解扱い。","lecture":4},{"no":87,"q":"重要政策に関する会議として、経済財政諮問会議、中央防災会議、男女共同参画会議などが置かれている。","a":"YES","tag":"第4回 内閣 YESNO","source":"第4回(5/1)その1","note":"","lecture":4},{"no":88,"q":"中央省庁改革後、法律や閣議決定により内閣に置かれる本部等が総合調整を行うケースが増加している。","a":"YES","tag":"第4回 内閣官房・内閣府 YESNO","source":"第4回(5/1)その2","note":"","lecture":4},{"no":89,"q":"中央省庁改革後、2015年ごろまで、全体として内閣官房・内閣府に業務が集中する傾向が見られた。","a":"YES","tag":"第4回 内閣官房・内閣府 YESNO","source":"第4回(5/1)その2","note":"","lecture":4},{"no":90,"q":"中央省庁改革後、2015年までに、内閣官房のスタッフは定員・併任者ともに減少した。","a":"NO","tag":"第4回 内閣官房・内閣府 YESNO","source":"第4回(5/1)その2","note":"","lecture":4},{"no":91,"q":"内閣府特命担当大臣の数は、内閣府発足当初より現在の方が多い。","a":"YES","tag":"第4回 内閣官房・内閣府 YESNO","source":"第4回(5/1)その2","note":"","lecture":4},{"no":92,"q":"東京（霞が関）の国の府省庁で働く公務員が国家公務員で、東京以外の公務員は地方公務員である。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":93,"q":"国会議員は公務員ではない。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":94,"q":"国家公務員と地方公務員では、地方公務員の数の方が多い。","a":"YES","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":95,"q":"日本はスウェーデンやフランスに比べ、労働者に占める公務員割合が相対的に低い。","a":"YES","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":96,"q":"2001年・2004年頃に国の行政機関の定員が大幅減少したのは、国家公務員の大量解雇が行われたためである。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":97,"q":"国家公務員法では一般職と特別職に分けられ、特別職はいわゆるキャリアを指す。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":98,"q":"国家公務員採用試験を実施するのは人事院である（外務省専門職員試験を除く）。","a":"YES","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":99,"q":"国家公務員採用試験（大卒）は、平成24年度以降、特別職試験と一般職試験が設けられた。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"総合職試験と一般職試験。","lecture":5},{"no":100,"q":"国家公務員試験に合格すると、人事院が各省への配属を決め、その後、数年ごとに各省をまたぐ人事異動が行われる。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":101,"q":"国家公務員の給与は、人事院の給与勧告を踏まえて決定される。","a":"YES","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":102,"q":"行政職俸給表（一）が総合職試験合格者、行政職俸給表（二）が一般職試験合格者の俸給表である。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":103,"q":"職種別職員数の中で、一番数が多いのは公安職である。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":104,"q":"日本の雇用慣行は終身雇用的であり、職階制が根付かなかった理由の一つとされる。","a":"YES","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":105,"q":"日本では職階制導入をめぐる大規模ストライキにより、職階制導入が断念された。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":106,"q":"日本の人事システムは「遅い昇進システム」と呼ばれる。","a":"YES","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":107,"q":"日本の変則的キャリアシステムでは、エリートとノンエリートを初期段階で選別するが、待遇差は諸外国に比べても大きい。","a":"NO","tag":"第5回 国家公務員 YESNO","source":"第5回(5/8)その1","note":"","lecture":5},{"no":108,"q":"新規採用はほぼ学卒時に限られ、中途入職・退職が少ない任用制は？","a":"閉鎖型任用制","tag":"第6回 閉鎖型・開放型","source":"第6回(5/15)その1","note":"","lecture":6},{"no":109,"q":"採用の際、その職位の職務・職責を果たす即戦力が重視される任用制は？","a":"開放型任用制","tag":"第6回 閉鎖型・開放型","source":"第6回(5/15)その1","note":"","lecture":6},{"no":110,"q":"中途入職が頻繁にある任用制は？","a":"開放型任用制","tag":"第6回 閉鎖型・開放型","source":"第6回(5/15)その1","note":"","lecture":6},{"no":111,"q":"採用時に学歴・職種対応の専門知識など一般的・潜在的能力が求められる任用制は？","a":"閉鎖型任用制","tag":"第6回 閉鎖型・開放型","source":"第6回(5/15)その1","note":"","lecture":6},{"no":112,"q":"職員欠員が生じるたびに新規採用が行われる任用制は？","a":"開放型任用制"," 3,"q":"法律案起案では、主管課を中心に10人程度の法令準備室を設置することが多い。","a":"YES","tag":"第7回 政策過程 YESNO","source":"第7回(5/22)その2","note":"","lecture":7},{"no":144,"q":"水平的調整とは、担当課内で係長→総括課長補佐→課長の順に検討が進む調整である。","a":"NO","tag":"第7回 政策過程 YESNO","source":"第7回(5/22)その2","note":"","lecture":7},{"no":145,"q":"垂直的調整とは、担当課と他の複数の課など、同じレベルの部局間で行われる調整である。","a":"NO","tag":"第7回 政策過程 YESNO","source":"第7回(5/22)その2","note":"","lecture":7},{"no":146,"q":"稟議制は「せいぎせい」と読む。","a":"NO","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"「りんぎせい」。","lecture":7},{"no":147,"q":"稟議制とは、末端職員が単独で発案した書類が順次回覧され、実質的意思決定が行われる方式である。","a":"NO","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":148,"q":"集団的意思決定には、下級職員に重要事案への参画意識を与え、士気を確保できる利点がある。","a":"YES","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":149,"q":"集団的意思決定には、過程が不透明で、責任の所在が不明確になりやすい欠点がある。","a":"YES","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":150,"q":"大官房主義とは、官房に10以上の課が設置されている官房のことである。","a":"NO","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":151,"q":"審議会は、国家行政組織法第3条と第8条等により設置される。","a":"NO","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"審議会は主に第8条等。第3条機関とは区別。","lecture":7},{"no":152,"q":"政策提言型審議会の機能として、不服審査や事案処理があげられる。","a":"NO","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":153,"q":"城山らの分析では、外務省と財務省は「現場型」とされた。","a":"NO","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":154,"q":"城山らの分析で「企画型」とされた経済産業省などでは、官房系統組織が新たなアイデアを主導する。","a":"YES","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":155,"q":"各省間協議が必要なのは、新政策分野が登場したときや、同じ目的の事業が競合するときなどである。","a":"YES","tag":"第7回 稟議制・審議会 YESNO","source":"第7回(5/22)その3","note":"","lecture":7},{"no":156,"q":"米国連邦職員が日本政府機関等で1年間研修する計画は何研修計画？","a":"マンスフィールド研修計画","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":157,"q":"シルバさんが配属された日本の省（再編前）は？","a":"大蔵省","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":158,"q":"ロンダさんが配属された日本の省（再編前）は？","a":"通商産業省","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":159,"q":"シルバさん・ロンダさんは配属先でどのような空間で働いた？","a":"大部屋で","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":160,"q":"ロンダさんは米国で仕事についてどのように決定してきた？","a":"自分一人で","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":161,"q":"ロンダさんが理解した日本的な意思決定方法は？","a":"集団的な意思決定","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":162,"q":"オースティンさんの懇談会には誰が参加していた？","a":"環境庁職員のほか、外部の有識者など","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":163,"q":"南川課長は、日本の意思決定をどう表現した？","a":"誰が決定しているのかよくわからない","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":164,"q":"シルバさんの同僚は、日本の組織にはどのようなルールが多いと言った？","a":"言葉に出して言うのではない「なんとなくのルール」が多い","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":165,"q":"オースティンさんは、日本の組織をどう説明した？","a":"まるで家族のようだ","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":166,"q":"日本の官僚はみな、どうしていた？","a":"夜遅くまでしごとをしていた","tag":"第8回 マンスフィールド研修","source":"第8回(5/29)小テスト","note":"","lecture":8},{"no":167,"q":"審議会は、行政機関に置かれる合議制の諮問機関の総称で、国家行政組織法第3条・第8条などに基づく。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":168,"q":"審議会の機能は、政策提言型・不服審査型・事案処理型の3つに類型化できる。","a":"YES","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":169,"q":"政策提言型審議会では、行政立法や公共料金、免許・検定など個別処分について主務大臣の諮問を受けて審議する。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":170,"q":"旧通産省（現経産省）は企画型、旧建設省（現国交省）は現場型である。","a":"YES","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":171,"q":"内閣法制局の審査では、省内・省間の垂直的調整・水平的調整が適切だったかを審査する。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":172,"q":"与党審査の手続は国会法に定められている。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":173,"q":"与党審査には国会運営円滑化や党内民主主義確保の利点がある一方、国会審議が形骸化する問題がある。","a":"YES","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":174,"q":"自民党の与党審査の主な舞台は、政務調査会の部会である。","a":"YES","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":175,"q":"第二次安倍晋三内閣は少数与党内閣であったため、公明党の影響を常に受けてきた。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":176,"q":"官邸官僚とは、総合職試験合格後、内閣府・内閣官房に採用された国家公務員である。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":177,"q":"石破内閣は少数与党内閣で、野党との修正協議や国会審議の活発化がみられた。","a":"YES","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":178,"q":"高市首相は衆参両院で過半数を占める自民党総裁なので、望んだ法律案を意のまま成立させられる。","a":"NO","tag":"第9回 政策形成・与党審査 YESNO","source":"第9回(6/5)その1","note":"","lecture":9},{"no":179,"q":"予算とは、一会計年度の収入と支出の計画である。","a":"YES","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":180,"q":"日本国憲法86条により、内閣は毎会計年度の予算を作成し、国会に提出する。","a":"YES","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":181,"q":"特別会計予算の経費は、社会保障、文教・科学振興、防衛、公共事業、海外協力などに分類される。","a":"NO","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":182,"q":"一般会計歳入予算で最も多い割合を占める特例公債は、国の借金である。","a":"YES","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":183,"q":"ある時点で、次年度予算の決算・当年度予算の執行・前年度予算の作成が同時に行われている。","a":"NO","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":184,"q":"マクロの予算編成では歳出総額の大枠を決め、税制改正や公債発行の要否・規模も決める。","a":"YES","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":185,"q":"2000年代以降のマクロ編成では、経済財政諮問会議による「骨太の方針」が大きな役割を果たしている。","a":"YES","tag":"第10回 予算制度 YESNO","source":"第10回(6/12)その1","note":"","lecture":10},{"no":186,"q":"予算のミクロの編成過程は、重層的な意思決定過程である。","a":"YES","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":187,"q":"各課の予算要求原案は各局総務課で査定され、局としての予算要求書にまとめられる。","a":"YES","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":188,"q":"省の概算要求書は、財務省主税局に提出される。","a":"NO","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"主計局。","lecture":11},{"no":189,"q":"財務省主税局では、例年9月に各省庁からヒアリングを行う。","a":"NO","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"主計局。","lecture":11},{"no":190,"q":"財務省原案後、総務課長・局長・次官レベルの復活折衝を経て、最後は大臣折衝で決着する。","a":"YES","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":191,"q":"予算編成では、課・局・省・政府レベルへと垂直的に重層的な意思決定が行われる。","a":"YES","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":192,"q":"攻守交代制とは、要求側と査定側が段階ごとに入れ替わっていく過程をいう。","a":"YES","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":193,"q":"予算編成で重要な官房系統組織とは、課長・局長・事務次官のことである。","a":"NO","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":194,"q":"当初予算案が国会に提出されると、毎年、衆参両院で予算案の修正が行われる。","a":"NO","tag":"第11回 予算編成 YESNO","source":"第11回(6/19)その1","note":"","lecture":11},{"no":195,"q":"政策作成過程とは法律の立案から決定までを指し、その後はすべて政策実施過程とするのが常識である。","a":"NO","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"","lecture":11},{"no":196,"q":"どこからが政策実施過程か、明確に境界を設定するのは難しい。","a":"YES","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"","lecture":11},{"no":197,"q":"税金を課す処分や生活保護の決定などは、政策実施の活動である。","a":"YES","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"","lecture":11},{"no":198,"q":"警察官はスピード違反の明確な基準に合致すれば、すべて摘発している。","a":"NO","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"","lecture":11},{"no":199,"q":"都道府県の計画策定は、国にとっては政策実施、都道府県にとっては政策作成と捉えられることがある。","a":"YES","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"","lecture":11},{"no":200,"q":"原田大樹によると、行政計画や予算は個別的な執行である。","a":"NO","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"基準の定立。","lecture":11},{"no":201,"q":"警察官・ケースワーカー・学校教師などは、ストリートレベルの官僚と呼ばれる。","a":"YES","tag":"第11回 政策実施 YESNO","source":"第11回(6/19)その2","note":"","lecture":1 lecture":14},{"no":281,"q":"行政改革会議の提案を受け、内閣府創設や内閣法改正により内閣機能強化が図られた。","a":"YES","tag":"第14回 内閣機能強化 YESNO","source":"第14回(7/10)その2","note":"","lecture":14},{"no":282,"q":"小泉改革は「自民党の再生」を掲げ、自民党の原点に立ち返る方針を実践した。","a":"NO","tag":"第14回 小泉改革 YESNO","source":"第14回(7/10)その3","note":"","lecture":14},{"no":283,"q":"小泉は派閥均衡人事を踏襲せず、派閥に推薦リストを求めなかった。","a":"YES","tag":"第14回 小泉改革 YESNO","source":"第14回(7/10)その3","note":"","lecture":14},{"no":284,"q":"小泉は最大派閥の平成研究会から党三役を起用しないなど、派閥弱体化方針をとった。","a":"YES","tag":"第14回 小泉改革 YESNO","source":"第14回(7/10)その3","note":"","lecture":14},{"no":285,"q":"経済財政諮問会議の「骨太の方針」は、ボトムアップ型予算編成を官邸主導型へ転換させようとした。","a":"YES","tag":"第14回 小泉改革 YESNO","source":"第14回(7/10)その3","note":"","lecture":14},{"no":286,"q":"小泉は幹部公務員の一元管理制度を活用して、人事権を梃子に政治主導を実現した。","a":"NO","tag":"第14回 小泉改革 YESNO","source":"第14回(7/10)その3","note":"","lecture":14},{"no":287,"q":"第一次安倍晋三内閣が短期退陣した原因の一つは、官邸官僚が通常ラインを飛び越えて政策決定に関与したためだった。","a":"NO","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":288,"q":"第二次以降の安倍晋三内閣では、今井尚哉・杉田和博・和泉洋人ら官邸官僚が長期政権を支えた。","a":"YES","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":289,"q":"官邸主導の力の源泉の一つは、内閣人事局による幹部公務員の一元管理である。","a":"YES","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":290,"q":"内閣官房・内閣府の肥大化により、重要政策の司令塔機能が十分発揮できない事態があると紹介された。","a":"YES","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":291,"q":"田中秀明によれば、第二次安倍内閣以降の政治主導の中で官僚は非政治化していった。","a":"NO","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":292,"q":"田中秀明によれば、日本の政治任用は制度的にはフランスに近いが、実態はイギリスに近い。","a":"NO","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":293,"q":"田中秀明は、資格任用制の一般公務員を政治から切り離し、専門性・中立性に基づいて政策立案する存在にすべきだと主張した。","a":"YES","tag":"第14回 官邸主導 YESNO","source":"第14回(7/10)その4","note":"","lecture":14},{"no":294,"q":"特殊法人とは、公共上必要な事務・事業のうち、国が直接実施する必要はないが、民間に任せると実施されないおそれがあるもの等を効率的・効果的に行わせるために設立される法人である。正しい？","a":"NO","tag":"第15回 特殊法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":295,"q":"特殊法人には公団・公庫・事業団・特殊銀行・金庫などがある。このうち、公団は主に中小規模の政府金融機関で、公庫は広範囲で恒久的な基本政策の実施に関与する。正しい？","a":"NO","tag":"第15回 特殊法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":296,"q":"広義の特殊法人には、特殊会社が含まれる。特殊会社は政府が設置法にもとづいて設立した株式会社であり、日本政策金融公庫などがある。正しい？","a":"YES","tag":"第15回 特殊法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":297,"q":"独立行政法人は、予算や事業計画の認可権や法人の長の任命権を主務大臣が持ち、予算執行が会計検査院の検査対象になるなど、行政機関の分身である。正しい？","a":"NO","tag":"第15回 独立行政法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":298,"q":"特殊法人は、民間企業ではできなかった巨大プロジェクトの実現に寄与するなど重要な役割もあったが、1980年代頃には非効率性や民業圧迫の面から批判された。正しい？","a":"YES","tag":"第15回 特殊法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":299,"q":"特殊法人の非効率性を示すものとして批判された『ファミリー企業』とは、特殊法人の役員と親戚関係にある者が所有する民間企業で、一族に資金を環流させるものだった。正しい？","a":"NO","tag":"第15回 特殊法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":300,"q":"独立行政法人が節約や効率を追求するインセンティブを持たなかったのは、主たる原資が財政投融資であったからだと説明される。正しい？","a":"NO","tag":"第15回 独立行政法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":301,"q":"独立行政法人は、イギリスのエージェンシーをモデルとして橋本行革で議論され、2001年に導入された。資金調達に国の保証が得られないことや、中期目標・中期計画にもとづく評価が重視される点が特殊法人と異なる。正しい？","a":"YES","tag":"第15回 特殊法人・独立行政法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":302,"q":"独立行政法人制度の創設に伴い、特殊法人は独立行政法人への転換が義務づけられた。正しい？","a":"YES","tag":"第15回 特殊法人・独立行政法人","source":"第15回(7/17)その1","note":"","lecture":15},{"no":303,"q":"官民ファンドとは、起業・研究開発・農林水産業の振興などのために官民が出資して投資を行う基金であり、効率的な経営により全てが累積黒字となっている。正しい？","a":"NO","tag":"第15回 官民ファンド","source":"第15回(7/17)その1","note":"","lecture":15},{"no":304,"q":"業界団体は、事業者としての共通の利益を増進することを主たる目的とする事業者の結合体・連合体である。正しい？","a":"YES","tag":"第15回 業界団体","source":"第15回(7/17)その1","note":"","lecture":15},{"no":305,"q":"省庁は政策の円滑な実施のために業界団体を利用してきた。一方で、業界団体には既存事業者の既得権益を保護する側面もあった。正しい？","a":"YES","tag":"第15回 業界団体","source":"第15回(7/17)その1","note":"","lecture":15},{"no":306,"q":"業界団体の負の効果として、行政に民間企業の意見を反映してきたことや、行政の仕事を一部代行して国民の税負担を低く抑えてきたことがある。正しい？","a":"NO","tag":"第15回 業界団体","source":"第15回(7/17)その1","note":"","lecture":15}],"lectures":[{"num":1,"date":"4/10","title":"行政学の基本と学問分野","count":8},{"num":2,"date":"4/17","title":"政治概念・議院内閣制と大統領制","count":40},{"num":3,"date":"4/24","title":"行政組織・省庁編成","count":27},{"num":4,"date":"5/1","title":"内閣と内閣官房","count":16},{"num":5,"date":"5/8","title":"国家公務員制度","count":16},{"num":6,"date":"5/15","title":"任用制度とキャリア","count":20},{"num":7,"date":"5/22","title":"政策過程・稟議制と審議会","count":28},{"num":8,"date":"5/29","title":"マンスフィールド研修","count":11},{"num":9,"date":"6/5","title":"政策形成と与党審査","count":12},{"num":10,"date":"6/12","title":"予算制度","count":7},{"num":11,"date":"6/19","title":"予算編成・政策実施・行政国家の歴史","count":36},{"num":12,"date":"6/27","title":"現代行政学と各国比較","count":24},{"num":13,"date":"7/3","title":"日本の政官関係","count":24},{"num":14,"date":"7/10","title":"官邸主導と行政改革","count":24},{"num":15,"date":"7/17","count":13,"title":"特殊法人・独立行政法人・業界団体"}]};
const ALL_CARDS = DATA.cards;
const LECTURES = DATA.lectures;

let progress = {};
let currentFilter = 'all';
let shuffleOn = false;
let hideKnownOn = false;
let deck = [];
let deckPos = 0;
let flipped = false;
let resetArmed = false;
let resetTimer = null;

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildDeck(){
  let base = currentFilter === 'all' ? ALL_CARDS : ALL_CARDS.filter(c=>c.lecture===currentFilter);
  if(hideKnownOn) base = base.filter(c=>progress[c.no] !== 'known');
  deck = shuffleOn ? shuffleArr(base) : base.slice();
  deckPos = 0;
  flipped = false;
}

function currentCard(){ return deck[deckPos]; }

function masteredCountTotal(){
  return Object.keys(progress).filter(k=>progress[k]==='known').length;
}
function masteredCountFor(lectureNum){
  return ALL_CARDS.filter(c=>c.lecture===lectureNum && progress[c.no]==='known').length;
}

function frontFaceHTML(card){
  const shortTag = card.tag.replace(/^第\d+回\s*/,'') || card.tag;
  return ''
    + '<div class="card-meta"><span class="card-no">No.'+card.no+'</span><span class="card-tag">'+escapeHtml(shortTag)+'</span></div>'
    + '<div class="card-question">'+escapeHtml(card.q)+'</div>'
    + '<div class="flip-hint">タップして答えを見る</div>';
}

function backFaceHTML(card){
  let answerHTML;
  if(card.a === 'YES' || card.a === 'NO'){
    const isYes = card.a === 'YES';
    answerHTML = '<div class="yn-answer '+(isYes?'yn-yes':'yn-no')+'"><span class="yn-glyph">'+(isYes?'○':'✕')+'</span><span class="yn-word">'+card.a+'</span></div>';
  } else {
    answerHTML = '<div class="plain-answer"><span class="hl">'+escapeHtml(card.a)+'</span></div>';
  }
  const noteHTML = card.note ? '<div class="note-area"><span class="note-label">解説</span><span class="note-text">'+escapeHtml(card.note)+'</span></div>' : '';
  const known = progress[card.no] === 'known';
  return ''
    + '<div class="card-meta"><span class="card-no">No.'+card.no+'</span><span class="card-source">'+escapeHtml(card.source)+'</span></div>'
    + '<div class="answer-area">'+answerHTML+'</div>'
    + noteHTML
    + '<div class="mastery-row">'
    +   '<button class="mastery-btn not-yet" data-action="not-yet" type="button">まだ</button>'
    +   '<button class="mastery-btn mastered '+(known?'is-active':'')+'" data-action="mastered" type="button">覚えた'+(known?' ✓':'')+'</button>'
    + '</div>';
}

function bindCardInnerEvents(){
  const inner = document.getElementById('cardInner');
  const notYet = inner.querySelector('[data-action="not-yet"]');
  const mastered = inner.querySelector('[data-action="mastered"]');
  if(notYet) notYet.addEventListener('click', (e)=>{ e.stopPropagation(); markMastery('unknown'); });
  if(mastered) mastered.addEventListener('click', (e)=>{ e.stopPropagation(); markMastery('known'); });
}

function render(){
  const emptyEl = document.getElementById('emptyState');
  const cardWrap = document.getElementById('cardWrap');
  const navRow = document.getElementById('navRow');
  const lectureProgEl = document.getElementById('lectureProgress');

  updateHeader();
  updateTabs();

  if(deck.length === 0){
    emptyEl.hidden = false;
    cardWrap.hidden = true;
    navRow.hidden = true;
    lectureProgEl.hidden = true;
    return;
  }
  emptyEl.hidden = true;
  cardWrap.hidden = false;
  navRow.hidden = false;

  const card = currentCard();
  document.getElementById('tabFlag').textContent = '第'+card.lecture+'回';
  document.getElementById('cardInner').innerHTML = flipped ? backFaceHTML(card) : frontFaceHTML(card);
  document.getElementById('positionIndicator').textContent = (deckPos+1)+' / '+deck.length;
  document.getElementById('prevBtn').disabled = deckPos === 0;
  document.getElementById('nextBtn').disabled = deckPos === deck.length-1;

  if(currentFilter !== 'all'){
    const lec = LECTURES.find(l=>l.num===currentFilter);
    const got = masteredCountFor(currentFilter);
    lectureProgEl.hidden = false;
    document.getElementById('lectureBarFill').style.width = (lec.count? (got/lec.count*100):0)+'%';
    document.getElementById('lectureProgressLabel').textContent = 'この回 '+got+'/'+lec.count;
  } else {
    lectureProgEl.hidden = true;
  }

  if(flipped) bindCardInnerEvents();
}

function updateHeader(){
  document.getElementById('masteredCount').textContent = masteredCountTotal();
}

function updateTabs(){
  document.querySelectorAll('.tab-chip').forEach(chip=>{
    const val = chip.dataset.filter;
    const isActive = (val === 'all' && currentFilter==='all') || (Number(val)===currentFilter);
    chip.classList.toggle('active', isActive);
    const fill = chip.querySelector('.tab-fill');
    if(fill){
      if(val === 'all'){
        fill.style.width = (masteredCountTotal()/ALL_CARDS.length*100)+'%';
      } else {
        const lec = LECTURES.find(l=>l.num===Number(val));
        fill.style.width = (masteredCountFor(lec.num)/lec.count*100)+'%';
      }
    }
  });
}

function flipCard(){
  const inner = document.getElementById('cardInner');
  inner.classList.add('anim-flip');
  setTimeout(()=>{
    flipped = !flipped;
    render();
    inner.classList.remove('anim-flip');
  }, 150);
}

function goNext(){
  if(deckPos >= deck.length-1) return;
  const inner = document.getElementById('cardInner');
  inner.classList.add('anim-next');
  setTimeout(()=>{
    deckPos++;
    flipped = false;
    render();
    inner.classList.remove('anim-next');
  }, 140);
}

function goPrev(){
  if(deckPos <= 0) return;
  const inner = document.getElementById('cardInner');
  inner.classList.add('anim-prev');
  setTimeout(()=>{
    deckPos--;
    flipped = false;
    render();
    inner.classList.remove('anim-prev');
  }, 140);
}

function markMastery(status){
  const card = currentCard();
  progress[card.no] = status;
  saveProgress();
  render();
  if(deckPos < deck.length-1){
    setTimeout(()=>{ goNext(); }, 260);
  }
}

async function loadProgress(){
  try{
    const res = await window.storage.get('progress', false);
    if(res && res.value) progress = JSON.parse(res.value);
  }catch(e){ progress = {}; }
}
async function saveProgress(){
  try{
    await window.storage.set('progress', JSON.stringify(progress), false);
  }catch(e){ console.error('save failed', e); }
}

function handleResetClick(){
  const btn = document.getElementById('resetBtn');
  if(!resetArmed){
    resetArmed = true;
    btn.textContent = '本当にリセット？（もう一度タップ）';
    btn.classList.add('confirm');
    resetTimer = setTimeout(()=>{
      resetArmed = false;
      btn.textContent = '進捗をリセット';
      btn.classList.remove('confirm');
    }, 3000);
  } else {
    clearTimeout(resetTimer);
    resetArmed = false;
    btn.textContent = '進捗をリセット';
    btn.classList.remove('confirm');
    progress = {};
    saveProgress();
    buildDeck();
    render();
  }
}

function toggleShuffle(){
  shuffleOn = !shuffleOn;
  document.getElementById('shuffleBtn').classList.toggle('on', shuffleOn);
  buildDeck();
  render();
}
function toggleHideKnown(){
  hideKnownOn = !hideKnownOn;
  document.getElementById('hideKnownBtn').classList.toggle('on', hideKnownOn);
  buildDeck();
  render();
}
function selectFilter(val){
  currentFilter = val === 'all' ? 'all' : Number(val);
  buildDeck();
  render();
}

function initTabs(){
  const tabsEl = document.getElementById('tabs');
  let html = '<button class="tab-chip" data-filter="all"><span class="tab-fill"></span>すべて</button>';
  LECTURES.forEach(l=>{
    html += '<button class="tab-chip" data-filter="'+l.num+'"><span class="tab-fill"></span>第'+l.num+'回<span class="tab-date">'+l.date+'</span></button>';
  });
  tabsEl.innerHTML = html;
  tabsEl.querySelectorAll('.tab-chip').forEach(chip=>{
    chip.addEventListener('click', ()=> selectFilter(chip.dataset.filter));
  });
}

async function init(){
  await loadProgress();
  initTabs();
  buildDeck();
  render();

  const flashcard = document.getElementById('flashcard');
  flashcard.addEventListener('click', flipCard);
  flashcard.addEventListener('keydown', (e)=>{
    if(e.key===' ' || e.key==='Enter'){ e.preventDefault(); flipCard(); }
  });
  document.getElementById('prevBtn').addEventListener('click', goPrev);
  document.getElementById('nextBtn').addEventListener('click', goNext);
  document.getElementById('shuffleBtn').addEventListener('click', toggleShuffle);
  document.getElementById('hideKnownBtn').addEventListener('click', toggleHideKnown);
  document.getElementById('resetBtn').addEventListener('click', handleResetClick);
  document.getElementById('emptyShowAllBtn').addEventListener('click', ()=>{
    hideKnownOn = false;
    document.getElementById('hideKnownBtn').classList.remove('on');
    buildDeck();
    render();
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowRight') goNext();
    if(e.key === 'ArrowLeft') goPrev();
  });

  /* ---------- Swipe gesture ---------- */
  let touchStartX = 0;
  let touchStartY = 0;
  flashcard.addEventListener('touchstart', (e)=>{
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  flashcard.addEventListener('touchend', (e)=>{
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5){
      if(dx < 0) goNext();
      else goPrev();
    }
  }, {passive:true});
}
init();
</script>
</body>
</html>
